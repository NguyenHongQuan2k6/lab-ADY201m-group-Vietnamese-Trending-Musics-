<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 37 Vietnam Trending Music — EDA Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --s1: #0f1117; --s2: #181b24; --s3: #222638; --border: #252a3a;
            --acc: #e8ff47; --pink: #ff4d6d; --cyan: #38f5e8; --purple: #9b6dff;
            --green: #3dffa0; --blue: #4d8fff; --text: #eef0ff; --muted: #5a6080; --muted2: #8890b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }

        /* LOADING SCREEN */
        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 20px; transition: opacity .4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 48px; height: 48px; border: 3px solid var(--s3);
            border-top-color: var(--acc); border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ERROR SCREEN */
        #errorScreen {
            display: none; position: fixed; inset: 0; background: var(--bg);
            align-items: center; justify-content: center; z-index: 9998;
            flex-direction: column; gap: 16px; padding: 40px; text-align: center;
        }

        /* HEADER & GRID */
        header { background: linear-gradient(135deg, #0f1117, #121828 60%, #0a1020); border-bottom: 1px solid var(--border); padding: 40px 44px; }
        h1 { font-family: 'Bebas Neue', cursive; font-size: 60px; line-height: 0.95; margin-bottom: 14px; }
        h1 em { color: var(--acc); font-style: normal; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; }
        .panel { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 24px 28px; }
        .full { grid-column: 1 / 3; }
        .chart-wrap { height: 250px; position: relative; }
        
        /* KPI */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
        .kpi { padding: 22px 30px; border-right: 1px solid var(--border); }
        .kpi-val { font-family: 'Bebas Neue', cursive; font-size: 40px; }

        /* TABLE */
        .rtable { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rtable td { padding: 8px; font-size: 12px; border-bottom: 1px solid var(--s3); }
        
        /* SKEWNESS */
        .skew-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .skew-track { flex: 1; height: 8px; background: var(--s2); border-radius: 4px; position: relative; }
        .skew-bar { position: absolute; height: 100%; left: 50%; }

        #ttip { position: absolute; background: var(--s2); border: 1px solid var(--border); padding: 10px; border-radius: 4px; pointer-events: none; opacity: 0; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <div class="load-text">Đang kết nối MongoDB...</div>
        <div id="loadSub" style="font-size: 12px; color: var(--muted);">Đang tải dữ liệu từ API...</div>
    </div>

    <div id="errorScreen">
        <div style="font-size: 48px;">⚠️</div>
        <div style="font-family: 'Bebas Neue'; font-size: 32px; color: var(--pink);">Không kết nối được API</div>
        <p>Hãy đảm bảo <code>api_server.py</code> đang chạy tại port 5000.</p>
        <button onclick="location.reload()" style="padding: 10px 20px; background: var(--acc); border: none; cursor: pointer; font-family: 'Bebas Neue';">Thử lại</button>
    </div>

    <div id="app" style="display:none">
        <div id="ttip"></div>
        <header>
            <h1>Vietnam Trending <br><em>Music</em> — Top 37</h1>
            <p style="color: var(--muted2)">Cập nhật: <span id="updatedAt"></span></p>
        </header>

        <div class="kpi-row">
            <div class="kpi">
                <div style="font-size: 10px; color: var(--muted);">BÀI HÁT</div>
                <div class="kpi-val" id="kTotalSongs" style="color: var(--cyan);">--</div>
            </div>
            <div class="kpi">
                <div style="font-size: 10px; color: var(--muted);">NGHỆ SĨ</div>
                <div class="kpi-val" id="kArtists" style="color: var(--acc);">--</div>
            </div>
            <div class="kpi">
                <div style="font-size: 10px; color: var(--muted);">TỔNG LƯỢT TIM</div>
                <div class="kpi-val" id="kHearts" style="color: var(--pink);">--</div>
            </div>
            <div class="kpi">
                <div style="font-size: 10px; color: var(--muted);">AVG LISTENERS</div>
                <div class="kpi-val" id="kListeners" style="color: var(--purple);">--</div>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <div style="font-family: 'Bebas Neue'; margin-bottom: 10px;">Top 5 Listeners (Last.fm)</div>
                <div class="chart-wrap"><canvas id="cL"></canvas></div>
            </div>
            <div class="panel">
                <div style="font-family: 'Bebas Neue'; margin-bottom: 10px;">Top 5 Lượt Tim (NCT)</div>
                <div class="chart-wrap"><canvas id="cH"></canvas></div>
            </div>
            <div class="panel full">
                <div style="font-family: 'Bebas Neue'; margin-bottom: 10px;">BXH Chi Tiết</div>
                <div id="rankTable"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api/';

        async function loadAll() {
            try {
                const [songsRes, statsRes] = await Promise.all([
                    fetch(API + 'data'),
                    fetch(API + 'stats')
                ]);

                if (!songsRes.ok || !statsRes.ok) throw new Error("Lỗi API");

                const SONGS = await songsRes.json();
                const S = await statsRes.json();

                renderKPI(S.stats);
                renderCharts(S);
                renderRankTable(SONGS);

                document.getElementById('updatedAt').innerText = new Date().toLocaleString();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'flex';
            }
        }

        function renderKPI(stats) {
            document.getElementById('kTotalSongs').innerText = stats.total_songs;
            document.getElementById('kArtists').innerText = stats.unique_artists;
            document.getElementById('kHearts').innerText = stats.total_hearts.toLocaleString();
            document.getElementById('kListeners').innerText = stats.avg_listeners.toLocaleString();
        }

        function renderCharts(S) {
            new Chart(document.getElementById('cL'), {
                type: 'bar',
                data: {
                    labels: S.top5_listeners.map(x => x[0]),
                    datasets: [{ label: 'Listeners', data: S.top5_listeners.map(x => x[1]), backgroundColor: '#38f5e8' }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('cH'), {
                type: 'bar',
                data: {
                    labels: S.top5_hearts.map(x => x[0]),
                    datasets: [{ label: 'Hearts', data: S.top5_hearts.map(x => x[1]), backgroundColor: '#ff4d6d' }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });
        }

        function renderRankTable(songs) {
            let html = '<table class="rtable"><thead><tr><th>Hạng</th><th>Bài hát</th><th>Ca sĩ</th><th>Score</th></tr></thead><tbody>';
            songs.slice(0, 10).forEach((s, i) => {
                html += `<tr><td>${i+1}</td><td>${s.title}</td><td>${s.artist}</td><td>${Math.round(s.total_score || 0).toLocaleString()}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('rankTable').innerHTML = html;
        }

        loadAll();
    </script>
</body>
</html>
